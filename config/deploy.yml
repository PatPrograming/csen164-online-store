# Name of your application. Used to uniquely configure containers.
service: railsstore

# Name of the container image.
image: railsstore

# Deploy to these servers.
servers:
  web:
    - 35.161.45.210

# Serve plain HTTP on port 80 (no domain / no SSL certificate for this demo).
proxy:
  ssl: false
  app_port: 3000

# Where you keep your container images (Amazon ECR).
registry:
  server: 361450365649.dkr.ecr.us-west-2.amazonaws.com
  username: AWS
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true

# Connect to the server as the Ubuntu user.
ssh:
  user: ubuntu

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage volume for the SQLite databases and Active Storage files.
volumes:
  - "railsstore_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Build the image natively for the arm64 (Graviton) server.
builder:
  arch: arm64
